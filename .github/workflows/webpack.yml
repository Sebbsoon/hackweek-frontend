name: Deploy to Github Pages


on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
 
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_CLERK_SIGN_IN_URL: ${{ vars.VITE_CLERK_SIGN_IN_URL }}
      VITE_CLERK_SIGN_UP_URL: ${{ vars.VITE_CLERK_SIGN_UP_URL }}
      VITE_CLERK_AFTER_SIGN_IN_URL: ${{ vars.VITE_CLERK_AFTER_SIGN_IN_URL }}
      VITE_CLERK_AFTER_SIGN_UP_URL: ${{ vars.VITE_CLERK_AFTER_SIGN_UP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - run: npm install
      - run: npm run build
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4